<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>aero</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="aero" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="theme-color" content="#7c3aed" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #080810;
      color: #e2e8f0;
      font-family: 'Space Grotesk', sans-serif;
    }

    /* SPLASH */
    .splash {
      position: fixed;
      inset: 0;
      background: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 0.6s ease;
    }
    .splash.hide {
      opacity: 0;
      pointer-events: none;
    }
    .splash-greeting {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      line-height: 1.3;
    }
    .splash-sub {
      font-size: 0.85rem;
      color: #334155;
      margin-top: 10px;
      font-weight: 400;
    }

    /* PAGE DOTS */
    .dots {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 7px;
      z-index: 100;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(124,58,237,0.25);
      transition: all 0.25s;
    }
    .dot.active {
      background: #a78bfa;
      width: 20px;
      border-radius: 99px;
    }

    /* SLIDER */
    .slider {
      display: flex;
      width: 300vw;
      height: 100vh;
      overflow: hidden;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .slide {
      width: 100vw;
      height: 100vh;
      overflow-y: auto;
      padding: 52px 16px 48px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      -webkit-overflow-scrolling: touch;
    }

    /* HEADER */
    .header { padding: 4px 0 2px; }
    .header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }
    .header .date {
      color: #64748b;
      font-size: 0.85rem;
      margin-top: 4px;
      font-weight: 400;
    }

    /* BANNER */
    .banner {
      background: linear-gradient(135deg, rgba(124,58,237,0.18), rgba(167,139,250,0.10));
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 0.92rem;
      font-weight: 500;
      color: #a78bfa;
    }

    /* CARDS */
    .card {
      background: #0f0f1a;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 18px;
    }
    .card-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #7c3aed;
      margin-bottom: 14px;
    }

    /* TASKS */
    .task-list { display: flex; flex-direction: column; gap: 10px; }
    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .task-item:active { background: rgba(124,58,237,0.08); }
    .task-item.done { background: rgba(124,58,237,0.06); border-color: rgba(124,58,237,0.15); }

    .task-checkbox {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid rgba(124,58,237,0.4);
      background: transparent;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .task-item.done .task-checkbox { background: #7c3aed; border-color: #7c3aed; }
    .task-checkbox svg { display: none; }
    .task-item.done .task-checkbox svg { display: block; }

    .task-label {
      flex: 1;
      font-size: 0.92rem;
      font-weight: 500;
      color: #cbd5e1;
      transition: color 0.15s;
    }
    .task-item.done .task-label { text-decoration: line-through; color: #475569; }

    .task-badge {
      font-size: 0.72rem;
      font-weight: 600;
      color: #7c3aed;
      background: rgba(124,58,237,0.15);
      border-radius: 6px;
      padding: 3px 8px;
      white-space: nowrap;
    }
    .task-item.done .task-badge { color: #4a3a6b; background: rgba(124,58,237,0.07); }

    .task-footer { display: flex; justify-content: flex-end; margin-top: 14px; }
    .reset-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.08);
      color: #475569;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 7px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .stat-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .stat-value { font-size: 2rem; font-weight: 700; color: #a78bfa; line-height: 1; margin-bottom: 6px; }
    .stat-label { font-size: 0.75rem; color: #475569; font-weight: 500; }

    /* PAGE 2 HEADER */
    .p2-header { padding: 4px 0 2px; }
    .p2-header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .p2-header .sub { color: #64748b; font-size: 0.85rem; margin-top: 4px; }

    /* OUTREACH STATS */
    .stats-toggle-row { display: flex; gap: 6px; margin-bottom: 14px; }
    .toggle-pill {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: #475569;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 8px 0;
      cursor: pointer;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .toggle-pill.active { background: rgba(124,58,237,0.2); border-color: rgba(124,58,237,0.4); color: #a78bfa; }

    .outreach-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .outreach-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 14px 8px;
      text-align: center;
    }
    .outreach-val { font-size: 1.6rem; font-weight: 700; color: #a78bfa; line-height: 1; margin-bottom: 5px; }
    .outreach-val.rate { font-size: 1.3rem; }
    .outreach-label { font-size: 0.65rem; color: #475569; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }


    /* TEMPLATE CARDS */
    .template-stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .template-stat-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
    }
    .template-stat-val { font-size: 1.4rem; font-weight: 700; color: #a78bfa; line-height: 1; margin-bottom: 4px; }
    .template-stat-label { font-size: 0.65rem; color: #475569; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }


    /* ACCORDION */
    .accordion-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .accordion-trigger:active { background: rgba(124,58,237,0.08); }
    .accordion-subject {
      font-size: 0.82rem;
      font-weight: 500;
      color: #94a3b8;
      flex: 1;
    }
    .accordion-chevron {
      font-size: 0.7rem;
      color: #475569;
      transition: transform 0.25s;
      margin-left: 8px;
    }
    .accordion-trigger.open .accordion-chevron { transform: rotate(180deg); }
    .accordion-trigger.open { border-color: rgba(124,58,237,0.2); }

    .accordion-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .accordion-body.open { max-height: 600px; }
    .accordion-email {
      margin-top: 10px;
      padding: 14px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      font-size: 0.85rem;
      line-height: 1.65;
      color: #94a3b8;
      white-space: pre-wrap;
    }

    /* AERO */
    .aero-section {
      background: #0f0f1a;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      position: relative;
    }
    .aero-orb-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease;
    }
    .aero-orb-panel.slide-out {
      transform: translateY(-40px);
      opacity: 0;
      pointer-events: none;
    }
    #aero-canvas {
      cursor: pointer;
      display: block;
      -webkit-tap-highlight-color: transparent;
      border-radius: 50%;
      user-select: none;
      touch-action: none;
    }
    .aero-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: #a78bfa;
      text-transform: uppercase;
      padding: 6px 0;
    }
    .aero-label-btn {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .aero-state-label {
      font-size: 0.73rem;
      color: #475569;
      margin-top: 6px;
      text-align: center;
    }
    .aero-chat-panel {
      display: none;
      flex-direction: column;
      width: 100%;
      height: 360px;
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease;
    }
    .aero-chat-panel.slide-in {
      display: flex;
      transform: translateY(0);
      opacity: 1;
    }
    .aero-chat-panel.slide-from-below {
      transform: translateY(40px);
      opacity: 0;
    }
    .aero-chat-header {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
    }
    .aero-messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 10px;
    }
    .aero-msg {
      max-width: 86%;
      padding: 10px 13px;
      border-radius: 12px;
      font-size: 0.84rem;
      line-height: 1.5;
    }
    .aero-msg-aero {
      background: rgba(124,58,237,0.18);
      border: 1px solid rgba(124,58,237,0.22);
      color: #e2e8f0;
      align-self: flex-start;
      border-radius: 4px 12px 12px 12px;
    }
    .aero-msg-user {
      background: #1e1e2e;
      border: 1px solid rgba(255,255,255,0.05);
      color: #cbd5e1;
      align-self: flex-end;
      border-radius: 12px 4px 12px 12px;
    }
    .aero-input-bar { display: flex; gap: 8px; }
    .aero-text-input {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: #e2e8f0;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.88rem;
      padding: 10px 13px;
      outline: none;
    }
    .aero-text-input::placeholder { color: #334155; }
    .aero-text-input:focus { border-color: rgba(124,58,237,0.35); }
    .aero-send-btn {
      background: #7c3aed;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1.1rem;
      padding: 10px 15px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>

  <!-- SPLASH SCREEN -->
  <div class="splash" id="splash">
    <div class="splash-greeting" id="splash-greeting"></div>
    <div class="splash-sub" id="splash-sub"></div>
  </div>
  <script>
    // Runs instantly — no black flash
    (function() {
      const hour = new Date().getHours();
      const quotes = [
        "Let's make today count.",
        "One step closer to the first client.",
        "Show up. Stack the days.",
        "The streak won't build itself.",
        "Small actions, big results.",
        "Consistency beats talent.",
        "Every email is a chance.",
        "You're building something real.",
        "Keep the momentum going.",
        "The grind is the game.",
        "Outwork the doubt.",
        "Progress over perfection.",
        "Do the tasks. Trust the process.",
        "First client is closer than you think.",
        "Make it a great one.",
        "Your future self is watching.",
        "Stay locked in.",
        "Discipline is the shortcut.",
        "One more day, one more step.",
        "ChatAero needs you at your best.",
        "The work compounds. Keep going.",
        "Be the founder who shows up.",
        "Good days start with good habits.",
        "Don't wait — create.",
        "Finish strong.",
        "Every action moves the needle.",
        "The best time to work is now.",
        "Believe it. Build it.",
        "Make today worth remembering.",
        "You've got this, Alex.",
      ];
      const greeting = hour < 12 ? 'Good morning, Alex.' : hour < 18 ? 'Good afternoon, Alex.' : 'Good evening, Alex.';
      const quote = quotes[Math.floor(Math.random() * quotes.length)];
      document.getElementById('splash-greeting').textContent = greeting;
      document.getElementById('splash-sub').textContent = quote;
    })();
  </script>

  <!-- DOTS -->
  <div class="dots">
    <div class="dot active" id="dot-0"></div>
    <div class="dot" id="dot-1"></div>
    <div class="dot" id="dot-2"></div>
  </div>

  <!-- SLIDER -->
  <div class="slider" id="slider">

    <!-- PAGE 1: TASKS + STATS -->
    <div class="slide" id="slide-0">

      <div class="header">
        <h1>Tasks</h1>
        <div class="date" id="date-display"></div>
      </div>

      <div class="banner" id="banner"></div>

      <div class="card">
        <div class="card-label">Today's Tasks</div>
        <div class="task-list" id="task-list"></div>
        <div class="task-footer">
          <button class="reset-btn" id="reset-btn">Reset today</button>
        </div>
      </div>

      <div class="card">
        <div class="card-label">Stats</div>
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-value" id="streak-val">0 🔥</div>
            <div class="stat-label">Day streak</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="total-val">0</div>
            <div class="stat-label">Total days done</div>
          </div>
        </div>
      </div>

      <!-- NOTIFICATIONS — only visible if permission not yet granted -->
      <div id="notif-section" style="display:none;">
        <button id="enable-notif-btn" style="
          width:100%;
          background:rgba(124,58,237,0.12);
          border:1px solid rgba(124,58,237,0.25);
          border-radius:12px;
          color:#a78bfa;
          font-family:'Space Grotesk',sans-serif;
          font-size:0.88rem;
          font-weight:600;
          padding:14px;
          cursor:pointer;
          -webkit-tap-highlight-color:transparent;
        ">🔔 Enable Notifications</button>
      </div>

    </div>

    <!-- PAGE 2: OUTREACH + PIPELINE + FOLLOWUPS -->
    <div class="slide" id="slide-1">

      <div class="p2-header">
        <h1>Outreach</h1>
        <div class="sub" id="date-display-2"></div>
      </div>

      <div class="card">
        <div class="card-label">Email Stats</div>
        <div class="stats-toggle-row">
          <button class="toggle-pill active" id="pill-alltime" onclick="setStatView('alltime')">All Time</button>
          <button class="toggle-pill" id="pill-weekly" onclick="setStatView('weekly')">This Week</button>
        </div>
        <div class="outreach-grid">
          <div class="outreach-box">
            <div class="outreach-val" id="stat-sent">0</div>
            <div class="outreach-label">Sent</div>
          </div>
          <div class="outreach-box">
            <div class="outreach-val rate" id="stat-rate">0%</div>
            <div class="outreach-label">Open Rate</div>
          </div>
          <div class="outreach-box">
            <div class="outreach-val" id="stat-replies">0</div>
            <div class="outreach-label">Replies</div>
          </div>
        </div>
        <div id="synced-at" style="font-size:0.68rem;color:#334155;margin-top:10px;text-align:right;"></div>
      </div>

      <!-- AERO -->
      <div class="aero-section" id="aero-section">
        <div class="aero-orb-panel" id="aero-orb-panel">
          <div class="aero-label aero-label-btn" id="aero-to-chat-btn">AERO</div>
          <canvas id="aero-canvas" width="260" height="260"></canvas>
          <div class="aero-state-label" id="aero-state-label">Hold to speak</div>
        </div>
        <div class="aero-chat-panel" id="aero-chat-panel">
          <div class="aero-chat-header">
            <div class="aero-label aero-label-btn" id="aero-to-orb-btn">AERO</div>
          </div>
          <div class="aero-messages" id="aero-messages"></div>
          <div class="aero-input-bar">
            <input class="aero-text-input" id="aero-input" placeholder="Ask Aero anything..." />
            <button class="aero-send-btn" id="aero-send">↑</button>
          </div>
        </div>
      </div>

    </div>

    <!-- PAGE 3: EMAIL STRATS -->
    <div class="slide" id="slide-2">

      <div class="p2-header">
        <h1>Email Strats</h1>
        <div class="sub" id="date-display-3"></div>
      </div>

      <div id="template-cards"></div>

    </div>

  </div>

  <script>
    // ── HELPERS ──────────────────────────────────────────────────────────
    function todayKey() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function weekKey() {
      const d = new Date();
      const day = d.getDay();
      const monday = new Date(d);
      monday.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
      return `week-${monday.getFullYear()}-${String(monday.getMonth()+1).padStart(2,'0')}-${String(monday.getDate()).padStart(2,'0')}`;
    }
    function getDay() { return new Date().getDay(); }
    function formatDate(d) {
      return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
    }
    function load(key, fallback) {
      try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : fallback; }
      catch { return fallback; }
    }
    function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

    // ── TASKS ─────────────────────────────────────────────────────────────
    function getTasksForToday() {
      const day = getDay();
      const tasks = [
        { id: 'linkedin',  label: 'LinkedIn connections sent', badge: '20+' },
        { id: 'upwork',    label: 'Upwork proposal sent',       badge: '1+' },
        { id: 'ai',        label: '30 mins AI learning done',   badge: '30 min' },
      ];
      if (day === 0 || day === 4) {
        tasks.push({ id: 'followup', label: 'Schedule 30 follow up emails (send tomorrow)', badge: '30' });
      } else if (day >= 1 && day <= 3) {
        tasks.push({ id: 'coldemail', label: 'Schedule 30 cold emails (send tomorrow)', badge: '30' });
      }
      if (day === 5) {
        tasks.push({ id: 'updateleads', label: 'Update leads list', badge: '📋' });
      }
      return tasks;
    }

    // ── STATE ─────────────────────────────────────────────────────────────
    let completions  = load('completions_' + todayKey(), {});
    let streak       = load('streak', 0);
    let totalDays    = load('total_days', 0);
    let lastDone     = load('last_done_date', null);
    let statView     = 'alltime';
    let statsAllTime = load('stats_alltime', { sent: 0, opened: 0, replies: 0 });
    let statsWeekly  = load('stats_' + weekKey(), { sent: 0, opened: 0, replies: 0 });
    const tasks = getTasksForToday();

    // ── STREAK CHECK ──────────────────────────────────────────────────────
    (function() {
      if (!lastDone) return;
      const today = todayKey();
      if (lastDone === today) return;
      const diff = Math.round((new Date(today) - new Date(lastDone)) / 86400000);
      if (diff > 1) { streak = 0; save('streak', 0); }
    })();

    // ── RENDER ────────────────────────────────────────────────────────────
    function render() {
      const dateStr = formatDate(new Date());
      document.getElementById('date-display').textContent = dateStr;
      document.getElementById('date-display-2').textContent = dateStr;

      // Tasks
      const list = document.getElementById('task-list');
      list.innerHTML = '';
      tasks.forEach(task => {
        const done = !!completions[task.id];
        const item = document.createElement('div');
        item.className = 'task-item' + (done ? ' done' : '');
        item.innerHTML = `
          <div class="task-checkbox">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="task-label">${task.label}</span>
          <span class="task-badge">${task.badge}</span>`;
        item.addEventListener('click', () => toggleTask(task.id));
        list.appendChild(item);
      });

      // Banner
      const remaining = tasks.filter(t => !completions[t.id]).length;
      document.getElementById('banner').textContent = remaining === 0
        ? '🎯 All done for today! Smashing it Alex.'
        : `${remaining} task${remaining > 1 ? 's' : ''} left today — keep going!`;

      // Streak
      document.getElementById('streak-val').textContent = streak + ' 🔥';
      document.getElementById('total-val').textContent = totalDays;

      // Outreach stats
      renderStats();

    }

    function renderStats() {
      const stats = statView === 'alltime' ? statsAllTime : statsWeekly;
      document.getElementById('stat-sent').textContent = stats.sent;
      const rate = stats.sent > 0 ? Math.round((stats.opened / stats.sent) * 100) : 0;
      document.getElementById('stat-rate').textContent = rate + '%';
      document.getElementById('stat-replies').textContent = stats.replies;
      document.getElementById('pill-alltime').classList.toggle('active', statView === 'alltime');
      document.getElementById('pill-weekly').classList.toggle('active', statView === 'weekly');
    }

    // ── TASKS LOGIC ───────────────────────────────────────────────────────
    function toggleTask(id) {
      completions[id] = !completions[id];
      save('completions_' + todayKey(), completions);
      checkDayComplete();
      render();
    }

    function checkDayComplete() {
      const allDone = tasks.every(t => completions[t.id]);
      const today = todayKey();
      if (allDone && lastDone !== today) {
        lastDone = today;
        save('last_done_date', today);
        streak++;
        save('streak', streak);
        totalDays++;
        save('total_days', totalDays);
        fetch('/api/tasks-complete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ date: today }),
        }).catch(() => {});
      }
    }

    document.getElementById('reset-btn').addEventListener('click', () => {
      if (lastDone === todayKey()) {
        streak = Math.max(streak - 1, 0);
        totalDays = Math.max(totalDays - 1, 0);
        lastDone = null;
        save('streak', streak);
        save('total_days', totalDays);
        save('last_done_date', null);
        fetch('/api/tasks-reset', { method: 'POST' }).catch(() => {});
      }
      completions = {};
      save('completions_' + todayKey(), completions);
      render();
    });

    // ── OUTREACH ──────────────────────────────────────────────────────────
    function setStatView(view) {
      statView = view;
      renderStats();
    }


    // Fetch stats from server on load — only overrides localStorage if server has synced data
    async function fetchServerStats() {
      try {
        const res = await fetch('/api/stats');
        const data = await res.json();
        // Only trust server data if it's been synced at least once (syncedAt is set)
        if (data.syncedAt) {
          if (data.alltime) { statsAllTime = data.alltime; save('stats_alltime', statsAllTime); }
          if (data.weekly)  { statsWeekly  = data.weekly;  save('stats_' + weekKey(), statsWeekly); }
          // Load per-template stats
          if (data.templates) {
            TEMPLATES.forEach((t, i) => {
              if (data.templates[t.id]) {
                templateStats[i] = data.templates[t.id];
                save('tmpl_' + t.id, templateStats[i]);
              }
            });
          }
          const d = new Date(data.syncedAt);
          const label = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) + ' at ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
          const el = document.getElementById('synced-at');
          if (el) el.textContent = 'Synced ' + label;
          renderStats();
        }
      } catch {}
    }

    // ── EMAIL STRATS ──────────────────────────────────────────────────────
    const TEMPLATES = [
      {
        id: 'free-demo',
        name: 'Free Demo',
        subject: 'Quick question - [Company Name]',
        body: `Hey [First Name], I'll keep this short.

I'd love to build a free personalised ChatAero demo for [Clinic Name] — customised to your treatments and branding, so you can see exactly how it works before committing to anything.

Worth a look?

Alex Carver`,
      },
      {
        id: 'pain-point',
        name: 'Pain Point',
        subject: 'Quick question - [Company Name]',
        body: `Hey [First Name], something worth knowing.

Around 35% of dental patient enquiries come in outside clinic hours — at night, weekends, when no one's there to respond. By the time someone gets back to them, they've already booked elsewhere.

ChatAero's AI receptionist captures those enquiries instantly, 24/7. Happy to show you how it'd work for [Clinic Name] — no commitment.

Worth 2 minutes?

Alex Carver`,
      },
      {
        id: 'curiosity',
        name: 'Curiosity',
        subject: 'Quick question - [Company Name]',
        body: `Hey [First Name], one quick question.

If a patient visited [Clinic Name]'s website at 9pm tonight and wanted to book a consultation, what happens?

If the answer's nothing — that's exactly what ChatAero fixes. Happy to put together a quick personalised demo for [Clinic Name].

Alex Carver`,
      },
    ];

    let templateStats = TEMPLATES.map(t => load('tmpl_' + t.id, { sent: 0, opened: 0, replies: 0 }));
    let accordionOpen = [false, false, false];

    function renderTemplates() {
      document.getElementById('date-display-3').textContent = formatDate(new Date());
      const container = document.getElementById('template-cards');
      container.innerHTML = '';

      TEMPLATES.forEach((tmpl, i) => {
        const stats = templateStats[i];
        const rate = stats.sent > 0 ? Math.round((stats.opened / stats.sent) * 100) : 0;
        const isOpen = accordionOpen[i];

        const card = document.createElement('div');
        card.className = 'card';
        card.style.marginBottom = '14px';
        card.innerHTML = `
          <div class="card-label">${tmpl.name}</div>
          <div class="template-stats-grid">
            <div class="template-stat-box">
              <div class="template-stat-val">${stats.sent}</div>
              <div class="template-stat-label">Sent</div>
            </div>
            <div class="template-stat-box">
              <div class="template-stat-val">${rate}%</div>
              <div class="template-stat-label">Open Rate</div>
            </div>
            <div class="template-stat-box">
              <div class="template-stat-val">${stats.replies}</div>
              <div class="template-stat-label">Replies</div>
            </div>
          </div>
          <div class="accordion-trigger${isOpen ? ' open' : ''}" data-acc="${i}">
            <span class="accordion-subject">Subject: ${tmpl.subject}</span>
            <span class="accordion-chevron">▼</span>
          </div>
          <div class="accordion-body${isOpen ? ' open' : ''}">
            <div class="accordion-email">${tmpl.body}</div>
          </div>
        `;
        container.appendChild(card);
      });

      // Bind accordion toggles
      container.querySelectorAll('.accordion-trigger').forEach(trigger => {
        trigger.addEventListener('click', e => {
          const i = parseInt(trigger.dataset.acc);
          accordionOpen[i] = !accordionOpen[i];
          trigger.classList.toggle('open', accordionOpen[i]);
          trigger.nextElementSibling.classList.toggle('open', accordionOpen[i]);
        });
      });
    }

    // ── SWIPE / SLIDE ─────────────────────────────────────────────────────
    let currentPage = 0;
    const slider = document.getElementById('slider');

    function goTo(page) {
      currentPage = page;
      slider.style.transform = `translateX(-${page * 100}vw)`;
      document.getElementById('dot-0').className = 'dot' + (page === 0 ? ' active' : '');
      document.getElementById('dot-1').className = 'dot' + (page === 1 ? ' active' : '');
      document.getElementById('dot-2').className = 'dot' + (page === 2 ? ' active' : '');
      if (page === 2) renderTemplates();
    }

    // Touch swipe
    let touchStartX = 0;
    let touchStartY = 0;
    let swiping = false;

    slider.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      swiping = false;
    }, { passive: true });

    slider.addEventListener('touchmove', e => {
      const dx = e.touches[0].clientX - touchStartX;
      const dy = e.touches[0].clientY - touchStartY;
      if (!swiping && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) {
        swiping = true;
      }
      if (swiping) e.preventDefault();
    }, { passive: false });

    slider.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
        if (dx < 0 && currentPage < 2) goTo(currentPage + 1);
        else if (dx > 0 && currentPage > 0) goTo(currentPage - 1);
      }
    }, { passive: true });

    // Dot clicks
    document.getElementById('dot-0').addEventListener('click', () => goTo(0));
    document.getElementById('dot-1').addEventListener('click', () => goTo(1));
    document.getElementById('dot-2').addEventListener('click', () => goTo(2));

    // ── INIT ─────────────────────────────────────────────────────────────
    render();
    fetchServerStats();

    // ── SPLASH SCREEN DISMISS ─────────────────────────────────────────────
    setTimeout(() => {
      document.getElementById('splash').classList.add('hide');
      setTimeout(() => document.getElementById('splash').remove(), 600);
    }, 3000);

    // ── PUSH NOTIFICATIONS ────────────────────────────────────────────────
    function urlBase64ToUint8Array(b) {
      const pad = '='.repeat((4 - b.length % 4) % 4);
      const base64 = (b + pad).replace(/-/g, '+').replace(/_/g, '/');
      return Uint8Array.from([...atob(base64)].map(c => c.charCodeAt(0)));
    }

    async function subscribeToNotifications(reg) {
      try {
        const res = await fetch('/api/vapid-public-key');
        const { publicKey } = await res.json();
        let sub = await reg.pushManager.getSubscription();
        if (!sub) sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlBase64ToUint8Array(publicKey) });
        await fetch('/api/subscribe', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(sub) });
      } catch {}
    }

    (async () => {
      if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
      const reg = await navigator.serviceWorker.register('/sw.js').catch(() => null);
      if (!reg) return;
      await navigator.serviceWorker.ready;

      const section = document.getElementById('notif-section');
      const btn = document.getElementById('enable-notif-btn');

      if (Notification.permission === 'granted') {
        // Already granted — re-subscribe silently, keep button hidden
        await subscribeToNotifications(reg);
      } else if (Notification.permission === 'default') {
        // Not yet asked — show the button
        section.style.display = 'block';
        btn.addEventListener('click', async () => {
          const permission = await Notification.requestPermission();
          if (permission === 'granted') {
            await subscribeToNotifications(reg);
          }
          // Hide button regardless of outcome
          section.style.display = 'none';
        });
      }
      // If 'denied' — stay hidden, nothing we can do
    })();

    // ── AERO ──────────────────────────────────────────────────────────────
    const AERO_COLORS = { idle: 0x7c3aed, listening: 0xa78bfa, processing: 0x9333ea, speaking: 0xc4b5fd };

    let aeroState = 'idle';
    let aeroTime = 0;
    let aeroRecognition = null;
    let aeroTranscript = '';
    let aeroFinalTranscript = '';
    let aeroScene, aeroCamera, aeroRenderer, aeroParticles, aeroBasePos;
    let aeroHolding = false;

    // ── Orb size: 85% of container width ─────────────────────────────────
    function getAeroSize() {
      const section = document.getElementById('aero-section');
      const w = section ? Math.floor(section.clientWidth * 0.85) : 260;
      return Math.min(w, 340);
    }

    function initAeroOrb() {
      if (!window.THREE) return;
      const canvas = document.getElementById('aero-canvas');
      const S = getAeroSize();
      canvas.width = S; canvas.height = S;
      canvas.style.width = S + 'px'; canvas.style.height = S + 'px';

      aeroScene = new THREE.Scene();
      aeroCamera = new THREE.PerspectiveCamera(60, 1, 0.1, 100);
      aeroCamera.position.z = 3.4;

      aeroRenderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
      aeroRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      aeroRenderer.setSize(S, S);
      aeroRenderer.setClearColor(0x000000, 0);

      const N = 750;
      const pos = new Float32Array(N * 3);
      aeroBasePos = new Float32Array(N * 3);
      const phi = Math.PI * (3 - Math.sqrt(5));
      for (let i = 0; i < N; i++) {
        const y = 1 - (i / (N - 1)) * 2;
        const r = Math.sqrt(1 - y * y);
        const theta = phi * i;
        const x = Math.cos(theta) * r, z = Math.sin(theta) * r;
        pos[i*3] = aeroBasePos[i*3] = x;
        pos[i*3+1] = aeroBasePos[i*3+1] = y;
        pos[i*3+2] = aeroBasePos[i*3+2] = z;
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      const mat = new THREE.PointsMaterial({ color: AERO_COLORS.idle, size: 0.03, transparent: true, opacity: 0.9 });
      aeroParticles = new THREE.Points(geo, mat);
      aeroScene.add(aeroParticles);

      (function loop() {
        requestAnimationFrame(loop);
        aeroTime += 0.016;
        const p = aeroParticles.geometry.attributes.position;
        for (let i = 0, N = p.count; i < N; i++) {
          const bx = aeroBasePos[i*3], by = aeroBasePos[i*3+1], bz = aeroBasePos[i*3+2];
          let s = 1;
          if (aeroState === 'idle')            s = 1 + 0.025 * Math.sin(aeroTime * 0.9 + i * 0.01);
          else if (aeroState === 'listening')  s = 1 + 0.14  * Math.sin(aeroTime * 2.8 + i * 0.05);
          else if (aeroState === 'processing') s = 0.82 + 0.06 * Math.sin(aeroTime * 5 + i * 0.03);
          else if (aeroState === 'speaking')   s = 1 + 0.09  * Math.sin(aeroTime * 5.5 + by * 9);
          p.array[i*3] = bx*s; p.array[i*3+1] = by*s; p.array[i*3+2] = bz*s;
        }
        p.needsUpdate = true;
        const spd = aeroState === 'processing' ? 0.022 : aeroState === 'speaking' ? 0.013 : 0.006;
        aeroParticles.rotation.y += spd;
        aeroParticles.rotation.x += spd * 0.35;
        aeroRenderer.render(aeroScene, aeroCamera);
      })();
    }

    const AERO_STATE_LABELS = { idle: 'Hold to speak', listening: 'Listening...', processing: 'Thinking...', speaking: 'Replying...' };

    function setAeroState(s) {
      aeroState = s;
      if (aeroParticles) aeroParticles.material.color.setHex(AERO_COLORS[s]);
      const lbl = document.getElementById('aero-state-label');
      if (lbl) lbl.textContent = AERO_STATE_LABELS[s] || '';
    }

    // ── Voice selection ───────────────────────────────────────────────────
    function getBestVoice() {
      const voices = speechSynthesis.getVoices();
      return voices.find(v => /google/i.test(v.name))
        || voices.find(v => /natural|neural/i.test(v.name))
        || voices.find(v => v.lang === 'en-GB')
        || voices.find(v => v.lang.startsWith('en'))
        || null;
    }

    // ── Unlock SpeechSynthesis on first gesture (iOS requirement) ─────────
    let aeroSpeechUnlocked = false;
    function unlockSpeech() {
      if (aeroSpeechUnlocked) return;
      aeroSpeechUnlocked = true;
      // Speak a silent utterance — do NOT cancel immediately, let iOS mark as unlocked
      const utt = new SpeechSynthesisUtterance(' ');
      utt.volume = 0.01;
      utt.rate = 10; // finish almost instantly
      speechSynthesis.speak(utt);
    }

    // ── Press and hold ────────────────────────────────────────────────────
    const aeroCanvas = document.getElementById('aero-canvas');
    let aeroAutoReleaseTimer = null;

    function onAeroHoldStart(e) {
      e.preventDefault();
      e.stopPropagation();
      unlockSpeech(); // unlock on gesture while still in user gesture stack
      if (aeroState !== 'idle') return;
      aeroHolding = true;
      startAeroListening();
      // Safety auto-release after 15s in case touchend doesn't fire
      clearTimeout(aeroAutoReleaseTimer);
      aeroAutoReleaseTimer = setTimeout(() => {
        if (aeroHolding) { aeroHolding = false; releaseAeroListening(); }
      }, 15000);
    }

    function onAeroHoldEnd(e) {
      if (!aeroHolding) return;
      e.preventDefault();
      e.stopPropagation();
      aeroHolding = false;
      clearTimeout(aeroAutoReleaseTimer);
      if (aeroState === 'listening') releaseAeroListening();
    }

    aeroCanvas.addEventListener('mousedown', onAeroHoldStart);
    aeroCanvas.addEventListener('mouseup', onAeroHoldEnd);
    aeroCanvas.addEventListener('mouseleave', onAeroHoldEnd);
    aeroCanvas.addEventListener('touchstart', onAeroHoldStart, { passive: false });
    aeroCanvas.addEventListener('touchend', onAeroHoldEnd, { passive: false });
    aeroCanvas.addEventListener('touchcancel', onAeroHoldEnd, { passive: false });
    // Document-level fallback — catches touchend even if canvas loses the touch
    document.addEventListener('touchend', e => { if (aeroHolding) onAeroHoldEnd(e); }, { passive: false });
    document.addEventListener('mouseup', e => { if (aeroHolding) onAeroHoldEnd(e); });

    function startAeroListening() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { switchAeroToChat(); return; }
      aeroTranscript = '';
      aeroFinalTranscript = '';
      aeroRecognition = new SR();
      aeroRecognition.continuous = true;
      aeroRecognition.interimResults = true;
      aeroRecognition.lang = 'en-GB';
      aeroRecognition.onresult = e => {
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (e.results[i].isFinal) {
            aeroFinalTranscript += e.results[i][0].transcript + ' ';
          } else {
            aeroTranscript = e.results[i][0].transcript;
          }
        }
      };
      aeroRecognition.onerror = () => { aeroRecognition = null; setAeroState('idle'); };
      // onend is a safety fallback only — release captures transcript directly
      aeroRecognition.onend = () => { aeroRecognition = null; };
      aeroRecognition.start();
      setAeroState('listening');
    }

    function releaseAeroListening() {
      // Capture transcript NOW — don't wait for onend (unreliable on iOS)
      const msg = (aeroFinalTranscript + aeroTranscript).trim();
      if (aeroRecognition) {
        aeroRecognition.onend = null; // prevent any double-fire
        try { aeroRecognition.stop(); } catch {}
        aeroRecognition = null;
      }
      if (!msg) { setAeroState('idle'); return; }
      sendToAero(msg, 'voice');
    }

    async function sendToAero(message, mode) {
      setAeroState('processing');
      if (mode === 'chat') appendAeroMsg('user', message);
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 20000);
      try {
        const res = await fetch('/api/aero', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message }),
          signal: controller.signal,
        });
        clearTimeout(timeout);
        const data = await res.json();
        const reply = data.response || 'Something went wrong — try again.';
        if (mode === 'voice') {
          setAeroState('speaking');
          // Cancel anything pending, then speak immediately — no voice selection,
          // no getVoices() check, no voiceschanged (all unreliable on iOS PWA)
          speechSynthesis.cancel();
          const utt = new SpeechSynthesisUtterance(reply);
          utt.lang = 'en-GB';
          utt.rate = 0.95;
          utt.pitch = 1.0;
          utt.onend = () => setAeroState('idle');
          utt.onerror = () => {
            // Speech failed — show in chat as fallback
            setAeroState('idle');
            appendAeroMsg('aero', reply);
            if (!aeroInChat) switchAeroToChat();
          };
          speechSynthesis.speak(utt);
        } else {
          appendAeroMsg('aero', reply);
          setAeroState('idle');
        }
      } catch (err) {
        clearTimeout(timeout);
        setAeroState('idle');
        if (mode === 'chat') appendAeroMsg('aero', err.name === 'AbortError' ? 'Timed out — try again.' : 'Something went wrong. Try again.');
      }
    }

    function appendAeroMsg(role, text) {
      const msgs = document.getElementById('aero-messages');
      const div = document.createElement('div');
      div.className = 'aero-msg aero-msg-' + role;
      div.textContent = text;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    // ── Swipe to switch modes ─────────────────────────────────────────────
    let aeroSwipeStartY = 0;
    let aeroInChat = false;

    const aeroSection = document.getElementById('aero-section');
    aeroSection.addEventListener('touchstart', e => { aeroSwipeStartY = e.touches[0].clientY; }, { passive: true });
    aeroSection.addEventListener('touchend', e => {
      const dy = aeroSwipeStartY - e.changedTouches[0].clientY;
      if (!aeroInChat && dy > 50) switchAeroToChat();       // swipe up on orb → chat
      else if (aeroInChat && dy < -50) switchAeroToVoice(); // swipe down on chat → orb
    }, { passive: true });

    function switchAeroToChat() {
      if (aeroInChat) return;
      aeroInChat = true;
      const orb = document.getElementById('aero-orb-panel');
      const chat = document.getElementById('aero-chat-panel');
      orb.classList.add('slide-out');
      chat.style.display = 'flex';
      chat.classList.add('slide-from-below');
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          chat.classList.remove('slide-from-below');
          chat.classList.add('slide-in');
        });
      });
      setTimeout(() => { orb.style.display = 'none'; orb.classList.remove('slide-out'); }, 350);
    }

    function switchAeroToVoice() {
      if (!aeroInChat) return;
      aeroInChat = false;
      const orb = document.getElementById('aero-orb-panel');
      const chat = document.getElementById('aero-chat-panel');
      orb.style.display = 'flex';
      requestAnimationFrame(() => {
        requestAnimationFrame(() => { orb.classList.remove('slide-out'); });
      });
      chat.classList.remove('slide-in');
      chat.classList.add('slide-from-below');
      setTimeout(() => {
        chat.style.display = 'none';
        chat.classList.remove('slide-from-below');
      }, 350);
    }

    document.getElementById('aero-to-chat-btn').addEventListener('click', switchAeroToChat);
    document.getElementById('aero-to-orb-btn').addEventListener('click', switchAeroToVoice);

    document.getElementById('aero-send').addEventListener('click', () => {
      const input = document.getElementById('aero-input');
      const msg = input.value.trim();
      if (!msg || aeroState === 'processing') return;
      input.value = '';
      sendToAero(msg, 'chat');
    });

    document.getElementById('aero-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('aero-send').click();
    });

    // Init orb after Three.js is available
    if (window.THREE) {
      initAeroOrb();
    } else {
      document.querySelector('script[src*="three"]').addEventListener('load', initAeroOrb);
    }
  </script>
</body>
</html>
