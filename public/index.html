<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alex's Daily Tracker</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tracker" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="theme-color" content="#7c3aed" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080810;
      color: #e2e8f0;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px 16px 48px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* HEADER */
    .header { padding: 8px 0 4px; }
    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }
    .header .date {
      color: #64748b;
      font-size: 0.9rem;
      margin-top: 4px;
      font-weight: 400;
    }

    /* BANNER */
    .banner {
      background: linear-gradient(135deg, rgba(124,58,237,0.18), rgba(167,139,250,0.10));
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 0.95rem;
      font-weight: 500;
      color: #a78bfa;
    }

    /* CARDS */
    .card {
      background: #0f0f1a;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 20px;
    }
    .card-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #7c3aed;
      margin-bottom: 16px;
    }

    /* TASKS */
    .task-list { display: flex; flex-direction: column; gap: 10px; }
    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }
    .task-item:hover { background: rgba(124,58,237,0.08); border-color: rgba(124,58,237,0.2); }
    .task-item.done { background: rgba(124,58,237,0.06); border-color: rgba(124,58,237,0.15); }

    .task-checkbox {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      border: 2px solid rgba(124,58,237,0.4);
      background: transparent;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .task-item.done .task-checkbox {
      background: #7c3aed;
      border-color: #7c3aed;
    }
    .task-checkbox svg { display: none; }
    .task-item.done .task-checkbox svg { display: block; }

    .task-label {
      flex: 1;
      font-size: 0.92rem;
      font-weight: 500;
      color: #cbd5e1;
      transition: color 0.15s;
    }
    .task-item.done .task-label {
      text-decoration: line-through;
      color: #475569;
    }

    .task-badge {
      font-size: 0.72rem;
      font-weight: 600;
      color: #7c3aed;
      background: rgba(124,58,237,0.15);
      border-radius: 6px;
      padding: 3px 8px;
      white-space: nowrap;
    }
    .task-item.done .task-badge { color: #4a3a6b; background: rgba(124,58,237,0.07); }

    .task-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 14px;
    }
    .reset-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.08);
      color: #475569;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .reset-btn:hover { border-color: rgba(124,58,237,0.4); color: #a78bfa; }

    /* CAR FUND */
    .fund-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }
    .fund-title { font-size: 0.95rem; font-weight: 500; color: #cbd5e1; }
    .fund-amount { font-size: 1.4rem; font-weight: 700; color: #a78bfa; }

    .progress-bar-bg {
      background: rgba(255,255,255,0.06);
      border-radius: 99px;
      height: 8px;
      width: 100%;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #a78bfa);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #475569;
      margin-bottom: 16px;
    }

    .fund-input-row {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    .fund-input {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: #e2e8f0;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .fund-input::placeholder { color: #334155; }
    .fund-input:focus { border-color: rgba(124,58,237,0.5); }

    .add-btn {
      background: #7c3aed;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 10px 18px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .add-btn:hover { background: #6d28d9; }

    .goal-reached {
      text-align: center;
      font-size: 1rem;
      font-weight: 600;
      color: #a78bfa;
      padding: 8px 0 4px;
    }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .stat-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: #a78bfa;
      line-height: 1;
      margin-bottom: 6px;
    }
    .stat-label { font-size: 0.75rem; color: #475569; font-weight: 500; }

    /* NOTIFICATION BUTTONS */
    .notif-btn {
      flex: 1;
      background: #7c3aed;
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 14px 18px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .notif-btn:hover { background: #6d28d9; }
    .notif-btn:disabled { opacity: 0.4; cursor: default; background: #7c3aed; }
    .notif-btn-secondary {
      flex: 0 0 auto;
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.3);
      color: #a78bfa;
    }
    .notif-btn-secondary:hover { background: rgba(124,58,237,0.25); }
  </style>
</head>
<body>
  <div class="container">

    <!-- HEADER -->
    <div class="header">
      <h1>Hey Alex 👋</h1>
      <div class="date" id="date-display"></div>
    </div>

    <!-- BANNER -->
    <div class="banner" id="banner"></div>

    <!-- TASKS CARD -->
    <div class="card">
      <div class="card-label">Today's Tasks</div>
      <div class="task-list" id="task-list"></div>
      <div class="task-footer">
        <button class="reset-btn" id="reset-btn">Reset today</button>
      </div>
    </div>

    <!-- CAR FUND CARD -->
    <div class="card">
      <div class="card-label">Car Fund Goal</div>
      <div class="fund-top">
        <span class="fund-title">Progress to £2,500</span>
        <span class="fund-amount" id="fund-amount">£0</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="progress-labels">
        <span>£0</span>
        <span id="fund-left">£2,500 to go</span>
        <span>£2,500</span>
      </div>
      <div id="goal-reached-msg"></div>
      <div class="fund-input-row">
        <input class="fund-input" id="fund-input" type="number" min="0" placeholder="Add £ earned..." />
        <button class="add-btn" id="add-btn">Add</button>
      </div>
    </div>

    <!-- STATS CARD -->
    <div class="card">
      <div class="card-label">Stats</div>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-value" id="streak-val">0 🔥</div>
          <div class="stat-label">Day streak</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="total-val">0</div>
          <div class="stat-label">Total days done</div>
        </div>
      </div>
    </div>

    <!-- NOTIFICATION BUTTONS -->
    <div id="notif-section" style="display:flex; gap:10px;">
      <button class="notif-btn" id="enable-notif-btn">🔔 Enable Notifications</button>
      <button class="notif-btn notif-btn-secondary" id="test-notif-btn">Test</button>
    </div>

  </div>

  <script>
    // ── HELPERS ──────────────────────────────────────────────────────────
    const GOAL = 2500;

    function todayKey() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function getDay() { return new Date().getDay(); } // 0=Sun,1=Mon,...,6=Sat

    function formatDate(d) {
      return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    }

    // ── TASKS DEFINITION ─────────────────────────────────────────────────
    function getTasksForToday() {
      const day = getDay();
      const tasks = [
        { id: 'linkedin',  label: 'LinkedIn connections sent',                  badge: '20+' },
        { id: 'upwork',    label: 'Upwork proposal sent',                        badge: '1+' },
        { id: 'ai',        label: '30 mins AI learning done',                    badge: '30 min' },
      ];
      if (day === 0 || day === 4) { // Sun or Thu
        tasks.push({ id: 'followup', label: 'Schedule 30 follow up emails (send tomorrow)', badge: '30' });
      } else if (day === 1 || day === 2 || day === 3) { // Mon Tue Wed
        tasks.push({ id: 'coldemail', label: 'Schedule 30 cold emails (send tomorrow)', badge: '30' });
      }
      // Fri (5) & Sat (6) — daily only, nothing extra
      return tasks;
    }

    // ── STORAGE ──────────────────────────────────────────────────────────
    function load(key, fallback) {
      try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : fallback; }
      catch { return fallback; }
    }
    function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

    // ── STATE ─────────────────────────────────────────────────────────────
    let completions = load('completions_' + todayKey(), {});
    let earned      = load('car_earned', 0);
    let streak      = load('streak', 0);
    let totalDays   = load('total_days', 0);
    let lastDone    = load('last_done_date', null);

    const tasks = getTasksForToday();

    // ── STREAK CHECK (run once on load) ──────────────────────────────────
    (function checkStreak() {
      if (!lastDone) return;
      const today = todayKey();
      if (lastDone === today) return; // already handled today

      const last = new Date(lastDone);
      const now  = new Date(today);
      const diff = Math.round((now - last) / 86400000);

      if (diff > 1) {
        // Missed a day — reset streak
        streak = 0;
        save('streak', 0);
      }
    })();

    // ── RENDER ────────────────────────────────────────────────────────────
    function render() {
      // Date
      document.getElementById('date-display').textContent = formatDate(new Date());

      // Tasks
      const list = document.getElementById('task-list');
      list.innerHTML = '';
      tasks.forEach(task => {
        const done = !!completions[task.id];
        const item = document.createElement('div');
        item.className = 'task-item' + (done ? ' done' : '');
        item.innerHTML = `
          <div class="task-checkbox">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="task-label">${task.label}</span>
          <span class="task-badge">${task.badge}</span>
        `;
        item.addEventListener('click', () => toggleTask(task.id));
        list.appendChild(item);
      });

      // Banner
      const remaining = tasks.filter(t => !completions[t.id]).length;
      const banner = document.getElementById('banner');
      if (remaining === 0) {
        banner.textContent = '🎯 All done for today! Smashing it Alex.';
      } else {
        banner.textContent = `${remaining} task${remaining > 1 ? 's' : ''} left today — keep going!`;
      }

      // Car fund
      const pct = Math.min((earned / GOAL) * 100, 100);
      document.getElementById('fund-amount').textContent = '£' + earned.toLocaleString('en-GB');
      document.getElementById('progress-fill').style.width = pct + '%';
      const left = Math.max(GOAL - earned, 0);
      document.getElementById('fund-left').textContent = left > 0 ? `£${left.toLocaleString('en-GB')} to go` : '£0 to go';
      const goalMsg = document.getElementById('goal-reached-msg');
      goalMsg.innerHTML = earned >= GOAL ? '<div class="goal-reached">Goal reached! 🎉</div>' : '';

      // Stats
      document.getElementById('streak-val').textContent = streak + ' 🔥';
      document.getElementById('total-val').textContent = totalDays;
    }

    // ── TOGGLE TASK ───────────────────────────────────────────────────────
    function toggleTask(id) {
      completions[id] = !completions[id];
      save('completions_' + todayKey(), completions);
      checkDayComplete();
      render();
    }

    function checkDayComplete() {
      const allDone = tasks.every(t => completions[t.id]);
      const today = todayKey();
      if (allDone && lastDone !== today) {
        lastDone = today;
        save('last_done_date', today);
        streak += 1;
        save('streak', streak);
        totalDays += 1;
        save('total_days', totalDays);
        // Tell server tasks are done so it skips the 6pm reminder
        fetch('/api/tasks-complete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ date: today }),
        }).catch(() => {});
      }
    }

    // ── RESET ─────────────────────────────────────────────────────────────
    document.getElementById('reset-btn').addEventListener('click', () => {
      // If today was already counted as a completed day, undo it
      if (lastDone === todayKey()) {
        streak = Math.max(streak - 1, 0);
        totalDays = Math.max(totalDays - 1, 0);
        lastDone = null;
        save('streak', streak);
        save('total_days', totalDays);
        save('last_done_date', null);
        // Tell server tasks are no longer complete so 6pm reminder fires again
        fetch('/api/tasks-reset', { method: 'POST' }).catch(() => {});
      }
      completions = {};
      save('completions_' + todayKey(), completions);
      render();
    });

    // ── CAR FUND ──────────────────────────────────────────────────────────
    document.getElementById('add-btn').addEventListener('click', addFunds);
    document.getElementById('fund-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addFunds();
    });

    function addFunds() {
      const input = document.getElementById('fund-input');
      const val = parseFloat(input.value);
      if (!isNaN(val) && val > 0) {
        earned = Math.round((earned + val) * 100) / 100;
        save('car_earned', earned);
        input.value = '';
        render();
      }
    }

    // ── INIT ─────────────────────────────────────────────────────────────
    render();

    // ── PUSH NOTIFICATIONS ───────────────────────────────────────────────
    const enableBtn = document.getElementById('enable-notif-btn');
    const testBtn   = document.getElementById('test-notif-btn');

    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - (base64String.length % 4)) % 4);
      const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const raw = atob(base64);
      return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
    }

    function updateEnableBtn() {
      if (!('Notification' in window)) {
        enableBtn.textContent = '🔕 Not supported';
        enableBtn.disabled = true;
        return;
      }
      if (Notification.permission === 'granted') {
        enableBtn.textContent = '✅ Notifications enabled';
        enableBtn.disabled = true;
      } else if (Notification.permission === 'denied') {
        enableBtn.textContent = '🚫 Notifications blocked — allow in browser settings';
        enableBtn.disabled = true;
      } else {
        enableBtn.textContent = '🔔 Enable Notifications';
        enableBtn.disabled = false;
      }
    }

    let swReg = null;

    async function registerSW() {
      if (!('serviceWorker' in navigator) || !('PushManager' in window)) return null;
      try {
        const reg = await navigator.serviceWorker.register('/sw.js');
        await navigator.serviceWorker.ready;
        swReg = reg;
        return reg;
      } catch (err) {
        console.warn('SW registration failed:', err);
        return null;
      }
    }

    async function subscribeAndSave(reg) {
      try {
        const res = await fetch('/api/vapid-public-key');
        const { publicKey } = await res.json();
        let sub = await reg.pushManager.getSubscription();
        if (!sub) {
          sub = await reg.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlBase64ToUint8Array(publicKey),
          });
        }
        await fetch('/api/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(sub),
        });
        return true;
      } catch (err) {
        console.warn('Subscribe failed:', err);
        return false;
      }
    }

    // Enable button — this is a user gesture so browser WILL show the popup
    enableBtn.addEventListener('click', async () => {
      enableBtn.disabled = true;
      enableBtn.textContent = 'Setting up...';
      const reg = swReg || await registerSW();
      if (!reg) { updateEnableBtn(); return; }
      const permission = await Notification.requestPermission();
      if (permission === 'granted') {
        await subscribeAndSave(reg);
      }
      updateEnableBtn();
    });

    // Test button — fires a test push via server
    testBtn.addEventListener('click', async () => {
      testBtn.textContent = 'Sending...';
      testBtn.disabled = true;
      try {
        await fetch('/api/test-notification', { method: 'POST' });
        testBtn.textContent = 'Sent ✓';
      } catch {
        testBtn.textContent = 'Failed';
      }
      setTimeout(() => { testBtn.textContent = 'Test'; testBtn.disabled = false; }, 2000);
    });

    // On load: register SW silently, and if already granted — re-subscribe
    (async () => {
      updateEnableBtn();
      const reg = await registerSW();
      if (reg && Notification.permission === 'granted') {
        await subscribeAndSave(reg);
        updateEnableBtn();
      }
    })();
  </script>
</body>
</html>
