<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alex's Daily Tracker</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tracker" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="theme-color" content="#7c3aed" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #080810;
      color: #e2e8f0;
      font-family: 'Space Grotesk', sans-serif;
    }

    /* PAGE DOTS */
    .dots {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 7px;
      z-index: 100;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(124,58,237,0.25);
      transition: all 0.25s;
    }
    .dot.active {
      background: #a78bfa;
      width: 20px;
      border-radius: 99px;
    }

    /* SLIDER */
    .slider {
      display: flex;
      width: 200vw;
      height: 100vh;
      overflow: hidden;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .slide {
      width: 100vw;
      height: 100vh;
      overflow-y: auto;
      padding: 52px 16px 48px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      -webkit-overflow-scrolling: touch;
    }

    /* HEADER */
    .header { padding: 4px 0 2px; }
    .header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }
    .header .date {
      color: #64748b;
      font-size: 0.85rem;
      margin-top: 4px;
      font-weight: 400;
    }

    /* BANNER */
    .banner {
      background: linear-gradient(135deg, rgba(124,58,237,0.18), rgba(167,139,250,0.10));
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 0.92rem;
      font-weight: 500;
      color: #a78bfa;
    }

    /* CARDS */
    .card {
      background: #0f0f1a;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 18px;
    }
    .card-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #7c3aed;
      margin-bottom: 14px;
    }

    /* TASKS */
    .task-list { display: flex; flex-direction: column; gap: 10px; }
    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .task-item:active { background: rgba(124,58,237,0.08); }
    .task-item.done { background: rgba(124,58,237,0.06); border-color: rgba(124,58,237,0.15); }

    .task-checkbox {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid rgba(124,58,237,0.4);
      background: transparent;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .task-item.done .task-checkbox { background: #7c3aed; border-color: #7c3aed; }
    .task-checkbox svg { display: none; }
    .task-item.done .task-checkbox svg { display: block; }

    .task-label {
      flex: 1;
      font-size: 0.92rem;
      font-weight: 500;
      color: #cbd5e1;
      transition: color 0.15s;
    }
    .task-item.done .task-label { text-decoration: line-through; color: #475569; }

    .task-badge {
      font-size: 0.72rem;
      font-weight: 600;
      color: #7c3aed;
      background: rgba(124,58,237,0.15);
      border-radius: 6px;
      padding: 3px 8px;
      white-space: nowrap;
    }
    .task-item.done .task-badge { color: #4a3a6b; background: rgba(124,58,237,0.07); }

    .task-footer { display: flex; justify-content: flex-end; margin-top: 14px; }
    .reset-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.08);
      color: #475569;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 7px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .stat-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .stat-value { font-size: 2rem; font-weight: 700; color: #a78bfa; line-height: 1; margin-bottom: 6px; }
    .stat-label { font-size: 0.75rem; color: #475569; font-weight: 500; }

    /* PAGE 2 HEADER */
    .p2-header { padding: 4px 0 2px; }
    .p2-header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .p2-header .sub { color: #64748b; font-size: 0.85rem; margin-top: 4px; }

    /* OUTREACH STATS */
    .stats-toggle-row { display: flex; gap: 6px; margin-bottom: 14px; }
    .toggle-pill {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: #475569;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 8px 0;
      cursor: pointer;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .toggle-pill.active { background: rgba(124,58,237,0.2); border-color: rgba(124,58,237,0.4); color: #a78bfa; }

    .outreach-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .outreach-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 14px 8px;
      text-align: center;
    }
    .outreach-val { font-size: 1.6rem; font-weight: 700; color: #a78bfa; line-height: 1; margin-bottom: 5px; }
    .outreach-val.rate { font-size: 1.3rem; }
    .outreach-label { font-size: 0.65rem; color: #475569; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }

    .outreach-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 12px; }
    .outreach-input-wrap { display: flex; flex-direction: column; gap: 4px; }
    .outreach-input-label { font-size: 0.65rem; color: #475569; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
    .outreach-input {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: #e2e8f0;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 10px 8px;
      outline: none;
      width: 100%;
      text-align: center;
    }
    .outreach-input:focus { border-color: rgba(124,58,237,0.5); }

    /* PIPELINE */
    .pipeline { display: flex; flex-direction: column; gap: 8px; }
    .pipeline-stage {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
    }
    .pipeline-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #7c3aed;
      flex-shrink: 0;
      opacity: 0.35;
      transition: opacity 0.15s;
    }
    .pipeline-stage.has-count .pipeline-dot { opacity: 1; }
    .pipeline-name { flex: 1; font-size: 0.88rem; font-weight: 500; color: #64748b; }
    .pipeline-stage.has-count .pipeline-name { color: #cbd5e1; }
    .pipeline-count-input {
      width: 54px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 7px;
      color: #a78bfa;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 6px 0;
      outline: none;
      text-align: center;
    }
    .pipeline-count-input:focus { border-color: rgba(124,58,237,0.5); }
    .pipeline-arrow { font-size: 0.65rem; color: #1e293b; text-align: center; padding: 0 14px; }

    /* FOLLOW-UPS */
    .followup-row { display: flex; align-items: center; gap: 14px; }
    .followup-count-display {
      font-size: 3rem;
      font-weight: 700;
      color: #a78bfa;
      line-height: 1;
      min-width: 64px;
    }
    .followup-count-display.zero { color: #1e293b; }
    .followup-right { flex: 1; }
    .followup-label { font-size: 0.88rem; color: #cbd5e1; font-weight: 500; }
    .followup-sub { font-size: 0.75rem; color: #475569; margin-top: 3px; }
    .followup-btns { display: flex; gap: 8px; margin-top: 10px; }
    .fu-btn {
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.25);
      border-radius: 8px;
      color: #a78bfa;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 8px 14px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .fu-btn.primary { background: #7c3aed; border-color: #7c3aed; color: #fff; }
  </style>
</head>
<body>

  <!-- DOTS -->
  <div class="dots">
    <div class="dot active" id="dot-0"></div>
    <div class="dot" id="dot-1"></div>
  </div>

  <!-- SLIDER -->
  <div class="slider" id="slider">

    <!-- PAGE 1: TASKS + STATS -->
    <div class="slide" id="slide-0">

      <div class="header">
        <h1>Hey Alex 👋</h1>
        <div class="date" id="date-display"></div>
      </div>

      <div class="banner" id="banner"></div>

      <div class="card">
        <div class="card-label">Today's Tasks</div>
        <div class="task-list" id="task-list"></div>
        <div class="task-footer">
          <button class="reset-btn" id="reset-btn">Reset today</button>
        </div>
      </div>

      <div class="card">
        <div class="card-label">Stats</div>
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-value" id="streak-val">0 🔥</div>
            <div class="stat-label">Day streak</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="total-val">0</div>
            <div class="stat-label">Total days done</div>
          </div>
        </div>
      </div>

    </div>

    <!-- PAGE 2: OUTREACH + PIPELINE + FOLLOWUPS -->
    <div class="slide" id="slide-1">

      <div class="p2-header">
        <h1>Outreach 📈</h1>
        <div class="sub" id="date-display-2"></div>
      </div>

      <div class="card">
        <div class="card-label">Email Stats</div>
        <div class="stats-toggle-row">
          <button class="toggle-pill active" id="pill-alltime" onclick="setStatView('alltime')">All Time</button>
          <button class="toggle-pill" id="pill-weekly" onclick="setStatView('weekly')">This Week</button>
        </div>
        <div class="outreach-grid">
          <div class="outreach-box">
            <div class="outreach-val" id="stat-sent">0</div>
            <div class="outreach-label">Sent</div>
          </div>
          <div class="outreach-box">
            <div class="outreach-val rate" id="stat-rate">0%</div>
            <div class="outreach-label">Open Rate</div>
          </div>
          <div class="outreach-box">
            <div class="outreach-val" id="stat-replies">0</div>
            <div class="outreach-label">Replies</div>
          </div>
        </div>
        <div class="outreach-inputs">
          <div class="outreach-input-wrap">
            <div class="outreach-input-label">Sent</div>
            <input class="outreach-input" type="number" min="0" id="input-sent" placeholder="0" inputmode="numeric" />
          </div>
          <div class="outreach-input-wrap">
            <div class="outreach-input-label">Opened</div>
            <input class="outreach-input" type="number" min="0" id="input-opened" placeholder="0" inputmode="numeric" />
          </div>
          <div class="outreach-input-wrap">
            <div class="outreach-input-label">Replies</div>
            <input class="outreach-input" type="number" min="0" id="input-replies" placeholder="0" inputmode="numeric" />
          </div>
        </div>
        <div id="synced-at" style="font-size:0.68rem;color:#334155;margin-top:10px;text-align:right;"></div>
      </div>

      <div class="card">
        <div class="card-label">Follow-ups Due Today</div>
        <div class="followup-row">
          <div class="followup-count-display zero" id="fu-count">0</div>
          <div class="followup-right">
            <div class="followup-label" id="fu-label">No follow-ups due</div>
            <div class="followup-sub" id="fu-sub">Tap Set to add today's count</div>
            <div class="followup-btns">
              <button class="fu-btn" onclick="adjustFollowups(-1)">− Sent one</button>
              <button class="fu-btn primary" onclick="setFollowups()">Set</button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // ── HELPERS ──────────────────────────────────────────────────────────
    function todayKey() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function weekKey() {
      const d = new Date();
      const day = d.getDay();
      const monday = new Date(d);
      monday.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
      return `week-${monday.getFullYear()}-${String(monday.getMonth()+1).padStart(2,'0')}-${String(monday.getDate()).padStart(2,'0')}`;
    }
    function getDay() { return new Date().getDay(); }
    function formatDate(d) {
      return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
    }
    function load(key, fallback) {
      try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : fallback; }
      catch { return fallback; }
    }
    function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

    // ── TASKS ─────────────────────────────────────────────────────────────
    function getTasksForToday() {
      const day = getDay();
      const tasks = [
        { id: 'linkedin',  label: 'LinkedIn connections sent', badge: '20+' },
        { id: 'upwork',    label: 'Upwork proposal sent',       badge: '1+' },
        { id: 'ai',        label: '30 mins AI learning done',   badge: '30 min' },
      ];
      if (day === 0 || day === 4) {
        tasks.push({ id: 'followup', label: 'Schedule 30 follow up emails (send tomorrow)', badge: '30' });
      } else if (day >= 1 && day <= 3) {
        tasks.push({ id: 'coldemail', label: 'Schedule 30 cold emails (send tomorrow)', badge: '30' });
      }
      if (day === 5) {
        tasks.push({ id: 'updateleads', label: 'Update leads list', badge: '📋' });
      }
      return tasks;
    }

    // ── STATE ─────────────────────────────────────────────────────────────
    let completions  = load('completions_' + todayKey(), {});
    let streak       = load('streak', 0);
    let totalDays    = load('total_days', 0);
    let lastDone     = load('last_done_date', null);
    let statView     = 'alltime';
    let statsAllTime = load('stats_alltime', { sent: 0, opened: 0, replies: 0 });
    let statsWeekly  = load('stats_' + weekKey(), { sent: 0, opened: 0, replies: 0 });
    let pipelineCounts = load('pipeline_counts', { Contacted:0, Opened:0, Replied:0, 'Demo Booked':0, Closed:0 });
    let followupDue  = load('followup_due_' + todayKey(), 0);
    const PIPELINE_STAGES = ['Contacted', 'Opened', 'Replied', 'Demo Booked', 'Closed'];
    const tasks = getTasksForToday();

    // ── STREAK CHECK ──────────────────────────────────────────────────────
    (function() {
      if (!lastDone) return;
      const today = todayKey();
      if (lastDone === today) return;
      const diff = Math.round((new Date(today) - new Date(lastDone)) / 86400000);
      if (diff > 1) { streak = 0; save('streak', 0); }
    })();

    // ── RENDER ────────────────────────────────────────────────────────────
    function render() {
      const dateStr = formatDate(new Date());
      document.getElementById('date-display').textContent = dateStr;
      document.getElementById('date-display-2').textContent = dateStr;

      // Tasks
      const list = document.getElementById('task-list');
      list.innerHTML = '';
      tasks.forEach(task => {
        const done = !!completions[task.id];
        const item = document.createElement('div');
        item.className = 'task-item' + (done ? ' done' : '');
        item.innerHTML = `
          <div class="task-checkbox">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="task-label">${task.label}</span>
          <span class="task-badge">${task.badge}</span>`;
        item.addEventListener('click', () => toggleTask(task.id));
        list.appendChild(item);
      });

      // Banner
      const remaining = tasks.filter(t => !completions[t.id]).length;
      document.getElementById('banner').textContent = remaining === 0
        ? '🎯 All done for today! Smashing it Alex.'
        : `${remaining} task${remaining > 1 ? 's' : ''} left today — keep going!`;

      // Streak
      document.getElementById('streak-val').textContent = streak + ' 🔥';
      document.getElementById('total-val').textContent = totalDays;

      // Outreach stats
      renderStats();

      // Pipeline
      const pipelineEl = document.getElementById('pipeline-list');
      pipelineEl.innerHTML = '';
      PIPELINE_STAGES.forEach((stage, i) => {
        const count = pipelineCounts[stage] || 0;
        const row = document.createElement('div');
        row.className = 'pipeline-stage' + (count > 0 ? ' has-count' : '');
        row.innerHTML = `
          <div class="pipeline-dot"></div>
          <span class="pipeline-name">${stage}</span>
          <input class="pipeline-count-input" type="number" min="0" inputmode="numeric" value="${count}" data-stage="${stage}" />`;
        pipelineEl.appendChild(row);
        if (i < PIPELINE_STAGES.length - 1) {
          const arrow = document.createElement('div');
          arrow.className = 'pipeline-arrow';
          arrow.textContent = '↓';
          pipelineEl.appendChild(arrow);
        }
      });
      document.querySelectorAll('.pipeline-count-input').forEach(inp => {
        inp.addEventListener('input', () => {
          const stage = inp.dataset.stage;
          pipelineCounts[stage] = parseInt(inp.value) || 0;
          save('pipeline_counts', pipelineCounts);
          const row = inp.closest('.pipeline-stage');
          const hasCount = pipelineCounts[stage] > 0;
          row.className = 'pipeline-stage' + (hasCount ? ' has-count' : '');
        });
      });

      // Follow-ups
      const fuEl = document.getElementById('fu-count');
      fuEl.textContent = followupDue;
      fuEl.className = 'followup-count-display' + (followupDue === 0 ? ' zero' : '');
      document.getElementById('fu-label').textContent = followupDue === 0
        ? 'No follow-ups due' : `${followupDue} follow-up${followupDue > 1 ? 's' : ''} to send`;
      document.getElementById('fu-sub').textContent = followupDue === 0
        ? 'Tap Set to add today\'s count' : 'Tap "Sent one" each time you send';
    }

    function renderStats() {
      const stats = statView === 'alltime' ? statsAllTime : statsWeekly;
      document.getElementById('stat-sent').textContent = stats.sent;
      const rate = stats.sent > 0 ? Math.round((stats.opened / stats.sent) * 100) : 0;
      document.getElementById('stat-rate').textContent = rate + '%';
      document.getElementById('stat-replies').textContent = stats.replies;
      document.getElementById('input-sent').value    = stats.sent    || '';
      document.getElementById('input-opened').value  = stats.opened  || '';
      document.getElementById('input-replies').value = stats.replies || '';
      document.getElementById('pill-alltime').classList.toggle('active', statView === 'alltime');
      document.getElementById('pill-weekly').classList.toggle('active', statView === 'weekly');
    }

    // ── TASKS LOGIC ───────────────────────────────────────────────────────
    function toggleTask(id) {
      completions[id] = !completions[id];
      save('completions_' + todayKey(), completions);
      checkDayComplete();
      render();
    }

    function checkDayComplete() {
      const allDone = tasks.every(t => completions[t.id]);
      const today = todayKey();
      if (allDone && lastDone !== today) {
        lastDone = today;
        save('last_done_date', today);
        streak++;
        save('streak', streak);
        totalDays++;
        save('total_days', totalDays);
        fetch('/api/tasks-complete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ date: today }),
        }).catch(() => {});
      }
    }

    document.getElementById('reset-btn').addEventListener('click', () => {
      if (lastDone === todayKey()) {
        streak = Math.max(streak - 1, 0);
        totalDays = Math.max(totalDays - 1, 0);
        lastDone = null;
        save('streak', streak);
        save('total_days', totalDays);
        save('last_done_date', null);
        fetch('/api/tasks-reset', { method: 'POST' }).catch(() => {});
      }
      completions = {};
      save('completions_' + todayKey(), completions);
      render();
    });

    // ── OUTREACH ──────────────────────────────────────────────────────────
    function setStatView(view) {
      statView = view;
      renderStats();
    }

    ['sent', 'opened', 'replies'].forEach(field => {
      document.getElementById('input-' + field).addEventListener('input', e => {
        const val = parseInt(e.target.value) || 0;
        if (statView === 'alltime') { statsAllTime[field] = val; save('stats_alltime', statsAllTime); }
        else { statsWeekly[field] = val; save('stats_' + weekKey(), statsWeekly); }
        const stats = statView === 'alltime' ? statsAllTime : statsWeekly;
        document.getElementById('stat-sent').textContent = stats.sent;
        document.getElementById('stat-rate').textContent = stats.sent > 0 ? Math.round((stats.opened / stats.sent) * 100) + '%' : '0%';
        document.getElementById('stat-replies').textContent = stats.replies;
      });
    });

    // Fetch stats from server on load and override localStorage
    async function fetchServerStats() {
      try {
        const res = await fetch('/api/stats');
        const data = await res.json();
        if (data.alltime) { statsAllTime = data.alltime; save('stats_alltime', statsAllTime); }
        if (data.weekly)  { statsWeekly  = data.weekly;  save('stats_' + weekKey(), statsWeekly); }
        if (data.syncedAt) {
          const d = new Date(data.syncedAt);
          const label = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) + ' at ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
          const el = document.getElementById('synced-at');
          if (el) el.textContent = 'Synced ' + label;
        }
        renderStats();
      } catch {}
    }

    // ── FOLLOW-UPS ────────────────────────────────────────────────────────
    function adjustFollowups(delta) {
      followupDue = Math.max(followupDue + delta, 0);
      save('followup_due_' + todayKey(), followupDue);
      const fuEl = document.getElementById('fu-count');
      fuEl.textContent = followupDue;
      fuEl.className = 'followup-count-display' + (followupDue === 0 ? ' zero' : '');
      document.getElementById('fu-label').textContent = followupDue === 0
        ? 'No follow-ups due' : `${followupDue} follow-up${followupDue > 1 ? 's' : ''} to send`;
      document.getElementById('fu-sub').textContent = followupDue === 0
        ? 'Tap Set to add today\'s count' : 'Tap "Sent one" each time you send';
    }

    function setFollowups() {
      const val = prompt('How many follow-ups due today?', followupDue);
      if (val !== null) { followupDue = Math.max(parseInt(val) || 0, 0); save('followup_due_' + todayKey(), followupDue); adjustFollowups(0); }
    }

    // ── SWIPE / SLIDE ─────────────────────────────────────────────────────
    let currentPage = 0;
    const slider = document.getElementById('slider');

    function goTo(page) {
      currentPage = page;
      slider.style.transform = `translateX(-${page * 100}vw)`;
      document.getElementById('dot-0').className = 'dot' + (page === 0 ? ' active' : '');
      document.getElementById('dot-1').className = 'dot' + (page === 1 ? ' active' : '');
    }

    // Touch swipe
    let touchStartX = 0;
    let touchStartY = 0;
    let swiping = false;

    slider.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      swiping = false;
    }, { passive: true });

    slider.addEventListener('touchmove', e => {
      const dx = e.touches[0].clientX - touchStartX;
      const dy = e.touches[0].clientY - touchStartY;
      if (!swiping && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) {
        swiping = true;
      }
      if (swiping) e.preventDefault();
    }, { passive: false });

    slider.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
        if (dx < 0 && currentPage === 0) goTo(1);
        else if (dx > 0 && currentPage === 1) goTo(0);
      }
    }, { passive: true });

    // Dot clicks
    document.getElementById('dot-0').addEventListener('click', () => goTo(0));
    document.getElementById('dot-1').addEventListener('click', () => goTo(1));

    // ── INIT ─────────────────────────────────────────────────────────────
    render();
    fetchServerStats();

    // ── PUSH NOTIFICATIONS (keep subscription alive silently) ─────────────
    function urlBase64ToUint8Array(b) {
      const pad = '='.repeat((4 - b.length % 4) % 4);
      const base64 = (b + pad).replace(/-/g, '+').replace(/_/g, '/');
      return Uint8Array.from([...atob(base64)].map(c => c.charCodeAt(0)));
    }
    (async () => {
      if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
      try {
        const reg = await navigator.serviceWorker.register('/sw.js');
        await navigator.serviceWorker.ready;
        if (Notification.permission === 'granted') {
          const res = await fetch('/api/vapid-public-key');
          const { publicKey } = await res.json();
          let sub = await reg.pushManager.getSubscription();
          if (!sub) sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlBase64ToUint8Array(publicKey) });
          await fetch('/api/subscribe', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(sub) });
        }
      } catch {}
    })();
  </script>
</body>
</html>
